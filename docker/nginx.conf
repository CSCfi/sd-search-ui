server {
    listen 8081;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    
    # /api/* requests are proxied to the backend and the /api prefix is stripped,
    # mirroring the Vite dev server proxy in vite.config.ts.
    location /api/ {
            proxy_pass ${BACKEND_URL}/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
    }

    # Without this, direct navigation to e.g. /search returns 404 — Vue
    # Router handles routing client-side, there's no physical /search file.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets are content-hashed by Vite — safe to cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html itself must never be cached, or deploys won't take effect
    # for users with a previously cached index.html.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
